<!DOCTYPE html>
<html lang="en">
<head>
    <title>solicitud</title>
    <link rel="stylesheet" href="solicitud.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script type="module" src="solicitud.js"></script>
</head>
<body>
 
      <button class="button-arrow-left">
        <i class="fas fa-arrow-left"></i> egresar
       </button>   
    <section class="solicitud"> 
         
       <p class="centrado">Informacion y entrega</p>
        <div class="entorno">  
            <form class="formulario"></form>
            <div class="contenedor">
                 <input class="nuevo" type="text" placeholder="nombre" required>
                 <input class="nuevo"type="text" placeholder="apellido" required>
            </div>
            <div class="grupo">
                 <input class="elementos" type="email" placeholder="correo" required>
                 <input class="elementos" type="text" placeholder="direccion" required>
            </div>
    
    <p class="centrado">Pago</p>
        <div class="contenedor">
        <input class="nuevo" type="text" placeholder="mes">
        <input class="nuevo" type="number" placeholder="año"> 
        </div>

        <div class="grupo"> 
        <input class="elementos" type="tex" number placeholder=" tarjeta" maxlength="15">
        <input class="elementos" type="text" placeholder="cvc">
        </div>   
      </form> 
      
      <div class="botones">
        <button id="enviar">Confirmar pago</button>
       </div>
      </section>
    
        
    <script type="module" src="solicitud.js"> </script>

</body>
</html>
